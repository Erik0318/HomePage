<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Callback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260306" />
  <style>
    .auth-nav {
      font-size: 0.7rem;
      gap: var(--space-3);
    }

    #status {
      white-space: pre-wrap;
      margin-top: 16px;
      color: var(--text);
    }

    #nextLink {
      display: inline-block;
      margin-top: 12px;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    #nextLink:hover,
    #nextLink:focus-visible {
      border-color: var(--accent);
    }
  </style>
</head>
<body data-page="auth-callback">
  <div class="site-vignette" aria-hidden="true"></div>
  <div class="custom-cursor" id="customCursor"></div>
  <div class="particles-container" id="particlesContainer"></div>
  <header class="site-header">
    <nav class="top-nav" aria-label="Primary">
      <a class="wordmark" href="index.html">ERIKDEV.CC</a>
      <div class="nav-links auth-nav">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="about.html">About me</a>
        <a href="blogs.html">Blogs</a>
        <a href="things.html">Things</a>
        <a href="albums.html">Albums</a>
        <a href="lab.html">Lab</a>
        <div style="border-left: 1px solid var(--muted); margin: 0 var(--space-3); height: auto;"></div>
        <div id="auth-links" style="font-size: 0.65rem;"></div>
      </div>
    </nav>
  </header>

  <main class="page-wrap">
    <h1 class="page-title">Finishing authentication</h1>
    <div id="status">Please wait...</div>
    <a id="nextLink" href="./login.html" style="display:none;">Continue</a>
  </main>

  <script src="main.js?v=20260306"></script>
  <script type="module">
    import { initTopbar } from "./js/topbar.js";
    import { supabase } from './js/supabase-client.js'

    initTopbar();

    const status = document.getElementById('status')
    const nextLink = document.getElementById('nextLink')

    async function run() {
      status.textContent = 'Processing confirmation link...'

      await new Promise(resolve => setTimeout(resolve, 800))

      const { data: sessionData, error: sessionError } = await supabase.auth.getSession()

      if (sessionError) {
        status.textContent = 'Callback error: ' + sessionError.message
        nextLink.style.display = 'inline-block'
        return
      }

      if (sessionData.session) {
        status.textContent =
          'Email confirmed and session created.\n\n' +
          'You can continue now.'
        nextLink.style.display = 'inline-block'
        return
      }

      const { data: userData, error: userError } = await supabase.auth.getUser()

      if (userError) {
        status.textContent = 'User check error: ' + userError.message
        nextLink.style.display = 'inline-block'
        return
      }

      if (userData.user) {
        status.textContent =
          'Email confirmed.\n\n' +
          'You can go log in now.'
        nextLink.style.display = 'inline-block'
        return
      }

      status.textContent =
        'No active session was found on this page.\n\n' +
        'Try going back to login.'
      nextLink.style.display = 'inline-block'
    }

    run()
  </script>
</body>
</html>
