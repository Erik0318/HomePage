<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Post</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .topbar a {
      text-decoration: none;
      color: blue;
    }

    form {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    input, textarea, button {
      font: inherit;
      padding: 10px;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    .hidden {
      display: none;
    }

    #status {
      margin: 16px 0;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Edit Post</h1>
    <div>
      <a href="./forum.html">Forum</a>
      |
      <a href="./me.html">My Account</a>
    </div>
  </div>

  <div id="status">Loading post...</div>

  <form id="edit-post-form" class="hidden">
    <label>
      Title
      <input id="title" type="text" maxlength="120" required />
    </label>

    <label>
      Content
      <textarea id="content" maxlength="10000" required></textarea>
    </label>

    <label>
      Country code (optional)
      <input id="country_code" type="text" maxlength="2" placeholder="US" />
    </label>

    <button id="submit-btn" type="submit">Save Changes</button>
  </form>

  <script type="module" src="./js/edit-post.js"></script>
</body>
</html>
