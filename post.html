<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERIKDEV.CC — Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260306" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── Entrance animations ── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      margin-bottom: var(--space-5);
      transition: color 0.2s ease, border-color 0.2s ease;
      animation: fadeIn 300ms both;
    }

    .back-link:hover,
    .back-link:focus-visible {
      color: var(--text);
      border-color: var(--accent);
    }

    /* ── Post article ── */
    .post-article {
      animation: slideUp 420ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .post-title {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 500;
      letter-spacing: 0.01em;
      line-height: 1.12;
      margin: 0 0 var(--space-4);
      color: var(--text);
    }

    .post-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem var(--space-2);
      align-items: center;
      font-family: var(--mono);
      font-size: 0.73rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: var(--space-5);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border);
    }

    .post-meta-sep {
      color: rgba(185, 178, 166, 0.3);
    }

    .post-body {
      line-height: 1.9;
      font-size: 1rem;
      color: var(--text);
      white-space: pre-wrap;
      word-wrap: break-word;
      padding-bottom: var(--space-4);
    }

    /* ── Post owner actions ── */
    .post-owner-actions {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-bottom: var(--space-4);
      animation: fadeIn 380ms 120ms both;
    }

    /* ── Shared action buttons ── */
    .action-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.45rem 0.85rem;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .action-btn:hover,
    .action-btn:focus-visible {
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── Vote bar (post level) ── */
    .vote-bar {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-5);
      animation: fadeIn 500ms 300ms both;
    }

    .vote-count {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
      min-width: 2.2rem;
      text-align: center;
      transition: color 0.18s ease;
    }

    .vote-count.positive { color: var(--accent); }
    .vote-count.negative { color: #8a6050; }

    .vote-login-hint {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.65;
    }

    /* ── Vote buttons (shared for post + comments) ── */
    .vote-button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 2.1rem;
      height: 2.1rem;
      border-radius: 50%;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.2s ease, color 0.2s ease,
                  background 0.2s ease, transform 0.13s ease;
    }

    .vote-button svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      transition: fill 0.12s ease;
    }

    .vote-button:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.1);
    }

    .vote-button:active:not(:disabled) {
      transform: scale(0.9);
    }

    .vote-button.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(176, 137, 91, 0.1);
    }

    .vote-button.active svg {
      fill: currentColor;
    }

    .vote-button:disabled {
      opacity: 0.32;
      cursor: not-allowed;
    }

    /* ── Comments section ── */
    .comments-section {
      margin-top: var(--space-6);
      padding-top: var(--space-5);
      border-top: 1px solid var(--border);
    }

    .comments-title {
      font-family: var(--serif);
      font-size: 1.65rem;
      font-weight: 500;
      margin: 0 0 var(--space-4);
      letter-spacing: 0.012em;
    }

    /* ── Comment form ── */
    .comment-form-wrap {
      margin-bottom: var(--space-5);
      padding-bottom: var(--space-5);
      border-bottom: 1px solid var(--border);
    }

    .form-group {
      display: grid;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }

    label {
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    textarea {
      display: block;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: var(--space-3);
      font-family: var(--body);
      font-size: 0.95rem;
      border-radius: var(--radius);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      min-height: 100px;
      resize: vertical;
      line-height: 1.65;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: inset 0 0 0 2px rgba(176, 137, 91, 0.08);
    }

    textarea::placeholder {
      color: var(--muted);
      opacity: 0.55;
    }

    #comment-submit-btn {
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    #comment-submit-btn:hover:not(:disabled),
    #comment-submit-btn:focus-visible:not(:disabled) {
      border-color: var(--accent);
      background: rgba(176, 137, 91, 0.06);
    }

    #comment-submit-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ── Status messages ── */
    .status-message {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: var(--space-3);
      display: none;
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .status-message:not(:empty) {
      display: block;
    }

    /* ── Comment cards ── */
    .comment-card {
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      margin-bottom: var(--space-3);
      opacity: 0;
      animation: slideUp 360ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: border-color 0.25s ease;
    }

    .comment-card:hover {
      border-color: rgba(80, 78, 72, 0.95);
    }

    .comment-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.2rem 0.55rem;
      margin-bottom: var(--space-3);
    }

    .comment-author {
      font-family: var(--mono);
      font-size: 0.74rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    .comment-date {
      font-family: var(--mono);
      font-size: 0.67rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      opacity: 0.75;
    }

    .comment-edited-tag {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.6;
      background: rgba(255, 255, 255, 0.04);
      padding: 0.1em 0.45em;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .comment-body {
      color: var(--text);
      line-height: 1.8;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.95rem;
      margin-bottom: var(--space-3);
    }

    .comment-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-2);
      padding-top: var(--space-2);
      border-top: 1px solid rgba(58, 57, 53, 0.5);
    }

    .vote-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .comment-vote-count {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      min-width: 1.4rem;
      text-align: center;
      transition: color 0.18s ease;
    }

    .comment-actions {
      display: flex;
      gap: 0.4rem;
    }

    .comment-actions .action-btn {
      padding: 0.3rem 0.55rem;
      font-size: 0.63rem;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
