<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260306" />
    <style>
      .auth-nav {
        font-size: 0.7rem;
        gap: var(--space-3);
      }

      form {
        display: grid;
        gap: 12px;
      }

      input,
      button {
        padding: 10px 12px;
        font-size: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: var(--radius);
      }

      button {
        cursor: pointer;
        text-transform: uppercase;
        font-family: var(--mono);
        font-size: 0.75rem;
        margin-top: 8px;
      }

      button:hover,
      button:focus-visible {
        border-color: var(--accent);
      }

      #result {
        margin-top: 16px;
        white-space: pre-wrap;
        color: var(--text);
      }

      .links {
        margin-top: var(--space-4);
        color: var(--muted);
      }

      .links a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid transparent;
      }

      .links a:hover,
      .links a:focus-visible {
        border-color: var(--accent);
      }
    </style>
  </head>
  <body data-page="login">
    <div class="site-vignette" aria-hidden="true"></div>
    <div class="custom-cursor" id="customCursor"></div>
    <div class="particles-container" id="particlesContainer"></div>
    <header class="site-header">
      <nav class="top-nav" aria-label="Primary">
        <a class="wordmark" href="index.html">ERIKDEV.CC</a>
        <div class="nav-links auth-nav">
          <a href="index.html">Home</a>
          <a href="projects.html">Projects</a>
          <a href="about.html">About me</a>
          <a href="blogs.html">Blogs</a>
          <a href="things.html">Things</a>
          <a href="albums.html">Albums</a>
          <a href="lab.html">Lab</a>
          <div style="border-left: 1px solid var(--muted); margin: 0 var(--space-3); height: auto;"></div>
          <div id="auth-links" style="font-size: 0.65rem;"></div>
        </div>
      </nav>
    </header>

    <main class="page-wrap">
      <h1 class="page-title">Log in</h1>

      <form id="loginForm">
        <input id="email" type="email" placeholder="email" required />
        <input id="password" type="password" placeholder="password" required />
        <button type="submit">Log in</button>
      </form>

      <div id="result"></div>

      <div class="links">
        <a href="./register.html">Need an account? Register</a>
      </div>
    </main>

    <script src="main.js?v=20260306"></script>
    <script type="module">
      import { initTopbar } from "./js/topbar.js";
      import { supabase } from "./js/supabase-client.js";

      initTopbar();

      const form = document.getElementById("loginForm");
      const result = document.getElementById("result");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        result.textContent = "Logging in...";

        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          result.textContent = "Login failed: " + error.message;
          return;
        }

        const user = data.user;

        const { data: profile, error: profileError } = await supabase
          .from("profiles")
          .select("username")
          .eq("id", user.id)
          .single();

        if (profileError) {
          result.textContent =
            "Login succeeded, but failed to load profile: " +
            profileError.message;
          return;
        }

        result.textContent =
          "Login succeeded.\n\n" +
          "Email: " +
          user.email +
          "\n" +
          "Username: " +
          profile.username +
          "\n\n" +
          "Redirecting to your account page...";

        setTimeout(() => {
          window.location.href = "./me.html";
        }, 800);
      });
    </script>
  </body>
</html>
