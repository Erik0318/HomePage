<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260306" />
  <style>
    .auth-nav {
      font-size: 0.7rem;
      gap: var(--space-3);
    }

    form {
      display: grid;
      gap: 12px;
    }

    input, button {
      padding: 10px 12px;
      font-size: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
    }

    button {
      cursor: pointer;
      text-transform: uppercase;
      font-family: var(--mono);
      font-size: 0.75rem;
      margin-top: 8px;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--accent);
    }

    #result {
      margin-top: 16px;
      white-space: pre-wrap;
      color: var(--text);
    }

    .links {
      margin-top: var(--space-4);
      color: var(--muted);
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    .links a:hover,
    .links a:focus-visible {
      border-color: var(--accent);
    }
  </style>
</head>
<body data-page="register">
  <div class="site-vignette" aria-hidden="true"></div>
  <div class="custom-cursor" id="customCursor"></div>
  <div class="particles-container" id="particlesContainer"></div>
  <header class="site-header">
    <nav class="top-nav" aria-label="Primary">
      <a class="wordmark" href="index.html">ERIKDEV.CC</a>
      <div class="nav-links auth-nav">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="about.html">About me</a>
        <a href="blogs.html">Blogs</a>
        <a href="things.html">Things</a>
        <a href="albums.html">Albums</a>
        <a href="lab.html">Lab</a>
        <div style="border-left: 1px solid var(--muted); margin: 0 var(--space-3); height: auto;"></div>
        <div id="auth-links" style="font-size: 0.65rem;"></div>
      </div>
    </nav>
  </header>

  <main class="page-wrap">
    <h1 class="page-title">Create account</h1>

    <form id="registerForm">
      <input id="username" placeholder="username" minlength="3" maxlength="24" required />
      <input id="email" type="email" placeholder="email" required />
      <input id="password" type="password" placeholder="password" minlength="8" required />
      <button type="submit">Register</button>
    </form>

    <div id="result"></div>

    <div class="links">
      <a href="./login.html">Already have an account? Log in</a>
    </div>
  </main>

  <script src="main.js?v=20260306"></script>
  <script type="module">
    import { initTopbar } from "./js/topbar.js";
    import { supabase } from './js/supabase-client.js'

    initTopbar();

    const form = document.getElementById('registerForm')
    const result = document.getElementById('result')

    function isValidUsername(username) {
      return /^[A-Za-z0-9_]{3,24}$/.test(username)
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const username = document.getElementById('username').value.trim()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value

      if (!isValidUsername(username)) {
        result.textContent = 'Username must be 3 to 24 characters and only use letters, numbers, or underscores.'
        return
      }

      result.textContent = 'Checking username...'

      const { data: existingUsernames, error: usernameCheckError } = await supabase
        .from('profiles')
        .select('id, username')
        .ilike('username', username)

      if (usernameCheckError) {
        result.textContent = 'Failed to check username: ' + usernameCheckError.message
        return
      }

      if (existingUsernames && existingUsernames.length > 0) {
        result.textContent = 'That username is already taken.'
        return
      }

      result.textContent = 'Creating account...'

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: `${window.location.origin}/auth-callback.html`,
          data: {
            username
          }
        }
      })

      if (error) {
        result.textContent = 'Signup failed: ' + error.message
        return
      }

      result.textContent =
        'Account created.\n\n' +
        'User ID: ' + (data.user?.id ?? 'not returned') + '\n' +
        'Email: ' + email + '\n\n' +
        'A confirmation email has been sent to your email! Please confirm your email first, then come back and log in.'
    })
  </script>
</body>
</html>
